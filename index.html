<!DOCTYPE html>
<html>

<head>
<title>Cloud Status</title>
</head>

<body>

<h1>Status da Infraestrutura</h1>

<p>API Status:</p>

<h2 id="status">Carregando...</h2>

<p>Timestamp:</p>

<p id="time"></p>

<script>

fetch("https://statusinfra.azurewebsites.net/api/status")
.then(response => response.json())
.then(data => {

document.getElementById("status").innerText = data.status;
document.getElementById("time").innerText = data.timestamp;

})
.catch(() => {

document.getElementById("status").innerText = "Erro ao conectar API";

});

</script>

</body>

</html>
